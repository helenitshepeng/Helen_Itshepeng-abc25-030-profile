    <div id="chatBox" class="chat-box">
      <h3 id="chatName"></h3>
        <div id="chatMessages" class="chat-messages"></div>
      <input type="text" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
      <button onclick="closeChat()">Close</butoon>  
      
    </div>

    <footer>
      <p>&copy; 2026 MatchMate</p>
    </footer>

  <script>

function sendMessage() {
  const input = document.getElementById("chatInput");
  const message = input.value;

  if (message.trim() === "") return;

  const chat = document.getElementById("chatMessages");

  
  const msg = document.createElement("p");
  msg.innerText = "You: " + message;
  msg.style.background = "#ffccd5";
  msg.style.padding = "8px";
  msg.style.borderRadius = "10px";
  msg.style.margin = "5px 0";

  chat.appendChild(msg);

  input.value = "";

  
  setTimeout(() => {
    const reply = document.createElement("p");
    reply.innerText = "Them: That's interesting 😊";
    reply.style.background = "#eee";
    reply.style.padding = "8px";
    reply.style.borderRadius = "10px";
    reply.style.margin = "5px 0";

    chat.appendChild(reply);
  }, 1000);
}

      document.getElementById("chatInput").addEventListener("keypress", function (e){
          sendMessage():
      }
                                                            });                                                           
                                                            
</script>
