<head>

</head>
<body>
    <header>

      <nav>

  <main>
    <div class="matches-container">

      <div class="match-card">
        <img src="image/user1.jpg">
        <h3>Dexter, 25</h3>
        <p class="match-percentage">90% Match</p>
        <p>Loves music, Artist</p>

        <div class="buttons">
          <button onclick="dislike(this)">❌</button>
          <button onclick="like(this, 'Dexter')">❤️</button>
        
      </div>
       </div>

      <div class="match-card">
        <img src="image/user2.jpg">
        <h3>Julian, 21</h3>
        <p class="match-percentage">85% Match</p>
        <p>Adventurous, loves travelling</p>

        <div class="button">
          <button onclick="dislike(this)">❌</button>
          <button onclick="like(this, Julian)">❤️</button>
          
        </div>
      </div>

      <div class="match-card">
        <img src="image/user3.jpg">
        <h3>Vanessa, 22</h3>
        <p class="match-percentage">73%</p>
        <p>Bookworm, Coffee lover</p>

        <div class="button">
          <button onclick="dislike(this)">❌</button>
          <button onclick="like(this, Vanessa)">❤️</button>
          
        </div>
      </div>

      <div class="match-card">
        <img src="image/user4.jpg">
        <h3>Laure, 27</h3>
        <p class="match-percentage">70%</p>
        <p>Model with passion of fashion</p>

        <div class="button">
           <button onclick="dislike(this)">❌</button>
          <button onclick="like(this, Laurel)">❤️</button>
          
        </div>    
      </div>
    </div>
  </main>

    <div id="chatBox" class="chat-box">
      <h3 id="chatName"></h3>
      <p>Hello there!</p>
      <input type="text" placeholder="Type a message...">
      <butoon onclick="closeChat()">Close</butoon>  
      
    </div>

    <footer>
      <p>&copy; 2026 MatchMate</p>
    </footer>

  <script>
    function like(btn, name) {
      const card = btn.closest('match-card');
      card.classList.add('swipe-right');

      setTimeout(() => {
        card.style.display = "none";
        openChat(name);
      }, 500);
    }

    function dislike(btn, name) {
      const card = btn.closest('match-card');
      card.class.List.add('swipe-left');

      srtTimeout(() =< {
        card.style.display = "none";
      openChat(name);
      }, 500);
    }

    function openChat(name) {
      document.getElementById("chatBox").style.display="block";
      document.getElementById("chatName").innerText="Chat with" + name;
    }

    function closeChat() {
      document.getElementById("chatBox").style.display="none";
    }
  </script>
</body>
</html>
