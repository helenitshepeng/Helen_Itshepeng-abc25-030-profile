    <header>

      <nav>

         <a href="gallery.html">Gallery</a>
         <a href="profile.html">Profile</a>
         <a href="contact.html">Contact</a>
      </nav>

    <section>
      <form action="#" method="post">
        <label>Firstname:</label><br/>
        <input type ="text" name="firstname" required placeholder="Firstname"><br/>

        <label>Surname:</label>
        <input type="text" name="surname" required placholder="Surname"/><br/>

        <label>Gender:</label>

        <select id="gender" name="gender" required>

          <option value="0"><Select></option>
          <option value="F"><Female></option>
          <option value="M"><Male></option>
          
        </select><br/>

        <label>DateOfBirth:</label>
        <input type="date" name="dateofbirth" required placeholder="Date Of Birth"><br/>

        <label>Cellno:</label>
        <input type="tel" name="cellno" required placeholder= "+267 XX XXX XXX"><br/>
        

        <label>Email:</label><br>
        <input type ="email" name="email" required placeholder="Email"><br/>

        <label>Message:</label><br>
        <textarea name="message" required></textarea><br/>

        <button type="submit">Send</button>
      </form>
    </section><br/>

    <footer>
      <p>2026 MatchMate</p>
    </footer>
    
  </body>
