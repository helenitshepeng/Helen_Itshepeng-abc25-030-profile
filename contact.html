<!DOCTYPE html>

  <head>
    <meta charset="UTF-8">

    <title>MatchMate | Contact</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <header>
      <h1> Contact Us</h1>
      <nav>
         <a href="index.html">Home</a><br/>
         <a href="about.html">About</a><br/>
         <a href="gallery.html">Gallery</a><br/>
         <a href="profile.html">Profile</a><br/>
         <a href="contact.html">Contact</a><br/>
      </nav><br/>
    </header>

    <main>
    <section>
      <h2>Get in Touch</h2>
      <form>
        <label>Firstname:</label><br/>
        <input type ="text" name="firstname" required placeholder="Firstname"><br/>

        <label>Surname:</label>
        <input type="text" name="surname" required placholder="Surname"/><br/>

        <label>Gender:</label>

        <label><input type="radio" name="gender">Male</label>
        <label><input type="radio" name="gender">Female</label>
        <label><input type="radio" name="gender">Other</label>

        <label for="looking">Looking for:</label>
        <select id="looking">
          <option>Men</option>
          <option>Women</option>
          <option>Both</option>
      
        </select><br/>

        <label>DateOfBirth:</label>
        <input type="date" name="dateofbirth" required placeholder="Date Of Birth"><br/>

        <label>Cellno:</label>
        <input type="tel" name="cellno" required placeholder= "+267 XX XXX XXX"><br/>
        

        <label>Email:</label><br>
        <input type ="email" name="email" required placeholder="Email"><br/>

        <label>Message:</label><br>
        <textarea name="message" required></textarea><br/>

        <button type="submit">Send</button>
      </form>
    </section><br/>
    </main>

    <footer>
      <p>&copy; 2026 MatchMate</p>
    </footer>
    
  </body>
