<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMate | Contact</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <header>
      <h1> Contact Us</h1>
      <nav>
         <a href="index.html">Home</a>
         <a href="about.html">About</a>
         <a href="gallery.html">Gallery</a>
         <a href="profile.html">Profile</a>
         <a href="contact.html" class="active">Contact</a>
      </nav>
    </header>

    <main>
    <section class="form group">
      <h2>Get in Touch</h2>
      <p>class="subtitle">Start your journey to finding love.</p>
      
      <form>
        <div class="form-group">
          <label>Firstname:</label>
          <input type ="text" id="firstname" name="firstname" required placeholder="Enter your first name">
        </div>
        
        <div class="form-group">
          <label>Surname:</label>
          <input type="text" id="surname" name="surname" required placeholder="Enter your surname"/>
        </div>

        <div class="form-group">
          <label>Gender:</label>
          <div class="radio-group">
          <label><input type="radio" name="gender">Male</label>
          <label><input type="radio" name="gender">Female</label>
          <label><input type="radio" name="gender">Other</label>
        </div>
        </div>

        <div class="form-group">
          <label for="looking">Looking for:</label>
          <select id="looking">
          <option>Men</option>
          <option>Women</option>
          <option>Both</option>
        </select>
        </div>

        <div class="form-group">
          <label>DateOfBirth:</label>
          <input type="date" name="dateofbirth" required>
        </div>

        <div class="form-group">
          <label>Cellno:</label>
          <input type="tel" id="cell" name="cellno" required placeholder= "+267 XX XXX XXX">
        </div>
        

        <div class="form-group">
          <label>Email:</label><br>
          <input type ="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label>Message:</label><br>
          <textarea name="message" id="message" rows="4"required placeholder="Tell us about yourself..."></textarea>
        </div>
        

        <div class="button-group">
          <button type="submit">Send Message</button>
          <button type="reset" class="secondary">Clear</button>
        </div>
        
      </form>
    </section>
    </main>

    <footer>
      <p>&copy; 2026 MatchMate</p>
    </footer>
    
  </body>
</html>
